server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy: HTTP Push → discover.flowics.com
    location /api/push/ {
        rewrite ^/api/push/(.*) /$1 break;
        proxy_pass https://discover.flowics.com;
        proxy_ssl_server_name on;
        proxy_set_header Host discover.flowics.com;
        proxy_set_header Origin https://discover.flowics.com;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: Control API → api.flowics.com
    location /api/flowics/ {
        rewrite ^/api/flowics/(.*) /$1 break;
        proxy_pass https://api.flowics.com;
        proxy_ssl_server_name on;
        proxy_set_header Host api.flowics.com;
        proxy_set_header Origin https://api.flowics.com;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
